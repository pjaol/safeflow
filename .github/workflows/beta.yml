name: Beta

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.4.0-alpha.1)'
        required: false
        default: 'v0.4.0-alpha.1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up fastlane
        run: gem install fastlane --no-document

      # ── Code Signing ─────────────────────────────────────────────────────────
      # Decode cert and profile from secrets into RUNNER_TEMP so fastlane can
      # import them. setup_ci (called inside the lane) creates the keychain.
      #
      # Secrets required:
      #   CERTIFICATES_P12          base64-encoded .p12 distribution cert
      #   CERTIFICATES_P12_PASSWORD export password for the .p12
      #   PROVISIONING_PROFILE      base64-encoded App Store .mobileprovision
      #   APPLE_TEAM_ID             10-char team ID
      #   ASC_KEY_ID                App Store Connect API key ID
      #   ASC_ISSUER_ID             App Store Connect issuer ID
      #   ASC_KEY_CONTENT           Contents of the .p8 API key file (not base64)

      - name: Decode certificate and profile
        run: |
          echo "${{ secrets.CERTIFICATES_P12 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

      # ── Version ──────────────────────────────────────────────────────────────
      # Git tag format: v0.4.0 or v0.4.0-alpha.1 or v0.4.0-beta.2
      # App Store version: numeric only (strips pre-release suffix)
      # Build number: github.run_number (always incrementing)

      - name: Run fastlane beta
        env:
          RAW_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
          BUILD_NUMBER: ${{ github.run_number }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: fastlane beta
