name: Beta

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_note:
        description: 'TestFlight what to test note'
        required: false
        default: 'Internal beta build'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── Code Signing ────────────────────────────────────────────────────────
      # Cert and profile are stored as base64-encoded GitHub Secrets.
      # To set these up:
      #   1. Export your distribution certificate from Keychain as a .p12 file
      #      (right-click → Export, choose Personal Information Exchange)
      #   2. base64 -i YourCert.p12 | pbcopy  → paste as CERTIFICATES_P12 secret
      #   3. Download your App Store provisioning profile from developer.apple.com
      #   4. base64 -i YourProfile.mobileprovision | pbcopy → paste as PROVISIONING_PROFILE secret
      #   5. Create an App Store Connect API key at appstoreconnect.apple.com/access/integrations/api
      #      Store Key ID as ASC_KEY_ID, Issuer ID as ASC_ISSUER_ID,
      #      and the .p8 file contents as ASC_KEY_CONTENT

      - name: Install certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Decode cert
          echo "$CERTIFICATES_P12" | base64 --decode > $RUNNER_TEMP/cert.p12

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import cert into keychain
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERTIFICATES_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"

          PP_UUID=$(security cms -D -i "$PP_PATH" \
            | plutil -extract UUID raw -)

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      # ── Build ───────────────────────────────────────────────────────────────

      - name: Increment build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD_NUMBER" \
            safeflow/Info.plist

      - name: Build archive
        run: |
          xcodebuild \
            -project safeflow.xcodeproj \
            -scheme safeflow \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/safeflow.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="safeflow AppStore" \
            archive \
            | xcpretty

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/safeflow.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      # ── Upload ──────────────────────────────────────────────────────────────

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/export/safeflow.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_KEY_CONTENT }}

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db || true
