name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Show build environment
        run: |
          xcodebuild -version
          xcrun simctl list devicetypes | grep "iPhone 16" | head -5

      - name: Build & Test
        run: |
          xcodebuild \
            -project safeflow.xcodeproj \
            -scheme safeflow \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            clean test \
            | xcpretty --report junit --output test-results/results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14
